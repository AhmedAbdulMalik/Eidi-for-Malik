<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eidi-for-Malik</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
 
</head>
<body>
    <div class="center">
  <div class="card" role="main" aria-labelledby="title">
    <div class="quote-wrap" id="intro">
  <div class="quote" id="quoteText"></div>
  <div class="sub" id="quoteAuthorLine">— <span id="quoteAuthor">Unknown</span></div>
</div>

    <div class="form" id="donationForm" aria-hidden="true">
      <h1 id="title" style="margin:0 0 0.6rem 0;font-size:1.15rem">Eid, sharing Joy & creating Memories!</h1>

      <div class="grid row-2">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" name="name" autocomplete="name" type="text" placeholder="your good name?" maxlength="100" />
        </div>
       <div class="field">
  
</div>
      <div class="grid row-2" style="margin-top:0.6rem">
        <div class="field">
          <label for="amount">Amount (INR)</label>
          <input id="amount" name="amount" type="number" placeholder="upto you :)" min="1" step="1" />
        </div>
        
      </div>

      <div class="actions">
        <button class="primary" id="donateBtn" type="button">Use UPI App</button>
        <div id="statusIndicator" class="muted sm" aria-live="polite"></div>
      </div>

      <div class="note sm" id="noteArea">
        After you click <strong>Use UPI App</strong>, your UPI app will open. You should see <strong>AHMED ABDUL MALIK</strong> as the name,
         <i>and you can give the Eidi without any worries :)</i> 
      </div>

      <footer class="footer">
  <a href="https://github.com/AhmedAbdulMalik/Eidi-for-Malik"
     target="_blank"
     rel="noopener noreferrer">
    Docs
  </a>

  
  <span class="sep">·</span>

  <span><a href="https://www.google.com/maps/place/Hyderabad"
     target="_blank"
     rel="noopener noreferrer">Made with ❤️ in Hyderabad</a></span>
</footer>

    </div>
  </div>
</div>
<script>
document.getElementById("quoteText").textContent =
  "After every fast comes a feast, and after every hardship comes ease.";
document.getElementById("quoteAuthor").textContent = "Someone on the internet";

setTimeout(() => {
  document.getElementById("intro").style.display = "none";
  const form = document.getElementById("donationForm");
  form.style.display = "block";
  form.setAttribute("aria-hidden", "false");
}, 2000);

document.getElementById("donateBtn").addEventListener("click", () => {
  const amount = document.getElementById("amount").value;

  if (!amount || amount <= 0) {
    alert("Enter valid amount");
    return;
  }

  window.location.href = "/pay?amount=" + amount;
});
</script>
</body>
</html>
